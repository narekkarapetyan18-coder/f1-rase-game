<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>F1 Race</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html,body { width:100%; height:100%; overflow:hidden; background:#000; font-family:'Courier New',monospace; }
canvas { display:block; }

#instructions {
  position:absolute; top:18px; left:50%; transform:translateX(-50%);
  text-align:center; color:#fff; font-size:14px; letter-spacing:1px;
  text-shadow:1px 1px 3px #000;
  pointer-events:none; display:none;
}
#instructions span {
  background:rgba(30,40,70,0.75); border-radius:4px;
  padding:3px 10px; display:inline-block; margin:2px 0;
}
#instructions kbd {
  background:#444; border:1px solid #888; border-radius:3px;
  padding:1px 5px; font-size:12px;
}

#hud {
  position:absolute; bottom:0; left:0; right:0;
  display:none; align-items:stretch;
  background:rgba(10,20,50,0.88);
  border-top:2px solid #1a3a6a;
  height:72px; pointer-events:none;
}
.hud-cell {
  flex:1; display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  border-right:1px solid #1a3a6a; padding:4px 8px;
}
.hud-cell:last-child { border-right:none; }
.hud-label { color:#8aaddd; font-size:11px; letter-spacing:2px; text-transform:uppercase; margin-bottom:3px; }
.hud-value { color:#fff; font-size:22px; letter-spacing:2px; }
#cell-cp { flex:0 0 90px; }
#cp-icon { font-size:20px; color:#ffdd00; margin-right:6px; }
#cp-val { color:#fff; font-size:18px; }
#speed-val { color:#fff; font-size:26px; }
#speed-unit { color:#8aaddd; font-size:12px; margin-left:2px; }

#go-msg {
  position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
  color:#ffdd00; font-size:64px; font-weight:bold; letter-spacing:6px;
  text-shadow:0 0 20px #ff8800, 2px 2px 0 #000;
  display:none; pointer-events:none;
}

/* ─── Main Menu ────────────────────────────────────────────────────────────── */
#main-menu {
  position:absolute; top:0; left:0; right:0; bottom:0;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  background:linear-gradient(175deg,rgba(12,20,52,0.82) 0%,rgba(8,14,38,0.76) 100%);
  z-index:100; user-select:none;
}
#menu-title {
  font-family:Arial,sans-serif; font-size:90px; font-weight:900; font-style:italic;
  color:#c8d8f8;
  text-shadow:0 0 28px rgba(150,185,255,0.65),0 0 60px rgba(80,140,255,0.22),2px 2px 0 rgba(0,0,0,0.55);
  letter-spacing:5px; margin-bottom:70px; margin-top:-30px;
}
#menu-buttons { display:flex; gap:14px; }
.menu-btn {
  width:155px; height:155px;
  background:rgba(16,30,76,0.92);
  border:none; border-radius:4px;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  cursor:pointer; transition:background 0.14s; gap:14px;
}
.menu-btn:hover { background:rgba(36,56,118,0.98); }
.menu-btn svg { width:62px; height:62px; fill:#fff; }
.menu-btn-label {
  color:#fff; font-size:14px; font-family:'Courier New',monospace;
  letter-spacing:2px; font-weight:bold; text-transform:uppercase;
}
#menu-bottom {
  position:absolute; bottom:18px; left:50%; transform:translateX(-50%);
  color:rgba(165,190,232,0.6); font-size:13px; letter-spacing:1px;
  white-space:nowrap; pointer-events:none;
}
</style>
</head>
<body>

<div id="instructions">
  <span><kbd>W</kbd> / <kbd>↑</kbd> Accelerate &nbsp; <kbd>S</kbd> / <kbd>↓</kbd> Brake &nbsp; <kbd>A</kbd><kbd>D</kbd> / <kbd>←</kbd><kbd>→</kbd> Steer</span><br>
  <span><kbd>R</kbd> / <kbd>Enter</kbd> Return to last checkpoint &nbsp;&nbsp; <kbd>T</kbd> / <kbd>Backspace</kbd> Start over</span>

<div id="hud">
  <div class="hud-cell" id="cell-cp">
    <div class="hud-label">Checkpoint</div>

  <div class="hud-cell" style="flex:0 0 110px">
    <div class="hud-label">Speed</div>
    <div><span id="speed-val">0</span><span id="speed-unit"> km/h</span></div>
  </div>
</div>

<div id="go-msg">GO!</div>

<!-- ─── Main Menu ──────────────────────────────────────────────────────────── -->
<div id="main-menu">
  <div id="menu-title">F1 Race</div>
  <div id="menu-buttons">

    <!-- Garage -->
    <button class="menu-btn" id="btn-garage">
      <svg viewBox="0 0 64 64">
        <rect x="26" y="10" width="12" height="38" rx="5"/>
        <rect x="12" y="22" width="40" height="14" rx="4"/>
        <ellipse cx="16" cy="17" rx="5" ry="7"/>
        <ellipse cx="48" cy="17" rx="5" ry="7"/>
        <ellipse cx="16" cy="47" rx="5" ry="7"/>
        <ellipse cx="48" cy="47" rx="5" ry="7"/>
        <rect x="28" y="6" width="8" height="6" rx="2"/>
      </svg>
      <span class="menu-btn-label">Garage</span>

    <!-- Settings -->
    <button class="menu-btn" id="btn-settings">
      <svg viewBox="0 0 64 64">
        <path d="M32 22a10 10 0 1 0 0 20 10 10 0 0 0 0-20zm0 16a6 6 0 1 1 0-12 6 6 0 0 1 0 12z"/>
        <path d="M53 28h-3.8a17.4 17.4 0 0 0-1.5-3.6l2.7-2.7-7.1-7.1-2.7 2.7A17.4 17.4 0 0 0 37 15.8V12H27v3.8a17.4 17.4 0 0 0-3.6 1.5l-2.7-2.7-7.1 7.1 2.7 2.7A17.4 17.4 0 0 0 14.8 28H11v8h3.8a17.4 17.4 0 0 0 1.5 3.6l-2.7 2.7 7.1 7.1 2.7-2.7a17.4 17.4 0 0 0 3.6 1.5V52h10v-3.8a17.4 17.4 0 0 0 3.6-1.5l2.7 2.7 7.1-7.1-2.7-2.7a17.4 17.4 0 0 0 1.5-3.6H53V28z"/>
      </svg>
      <span class="menu-btn-label">Settings</span>
    </button>

    <!-- Play -->
    <button class="menu-btn" id="btn-play">
      <svg viewBox="0 0 64 64">
        <polygon points="18,10 54,32 18,54"/>
      </svg>
      <span class="menu-btn-label">Play</span>
    </button>

  </div>
  <div id="menu-bottom">© 2026 F1 Race Game</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';

// ─── Scene ───────────────────────────────────────────────────────────────────
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
document.body.insertBefore(renderer.domElement, document.body.firstChild);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87ceeb);
scene.fog = new THREE.Fog(0x87ceeb, 180, 420);

const camera = new THREE.PerspectiveCamera(68, window.innerWidth / window.innerHeight, 0.1, 600);
camera.position.set(0, 5, 12);

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// Lights
const ambient = new THREE.AmbientLight(0xffffff, 0.55);
scene.add(ambient);
const sun = new THREE.DirectionalLight(0xfff5e0, 1.3);
sun.position.set(80, 120, 60);
sun.castShadow = true;
sun.shadow.mapSize.set(2048, 2048);
sun.shadow.camera.near = 1;
sun.shadow.camera.far = 500;
sun.shadow.camera.left = -200;
sun.shadow.camera.right = 200;
sun.shadow.camera.top = 200;
sun.shadow.camera.bottom = -200;
scene.add(sun);
scene.add(new THREE.HemisphereLight(0x87ceeb, 0x2d7a27, 0.35));

// ─── Ground ───────────────────────────────────────────────────────────────────
const groundGeo = new THREE.PlaneGeometry(800, 800);
const groundMat = new THREE.MeshLambertMaterial({ color: 0x3a7d2e });
const ground = new THREE.Mesh(groundGeo, groundMat);
ground.rotation.x = -Math.PI / 2;
ground.receiveShadow = true;
scene.add(ground);

// Low-poly mountains
function addMountain(x, z, h, r, col) {
  const geo = new THREE.ConeGeometry(r, h, 5 + Math.floor(Math.random() * 3));
  const mat = new THREE.MeshLambertMaterial({ color: col });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.position.set(x, h / 2, z);
  scene.add(mesh);
}
const mtnPositions = [
  [160, -180, 55, 45, 0x2d6e28], [200, -80, 45, 38, 0x336b2e],
  [180, 80,  50, 42, 0x3a7832], [140, 180, 40, 35, 0x2d6e28],
  [-160,-160, 60, 50, 0x336b2e], [-180, 0,  48, 40, 0x3a7832],
  [-140, 160, 52, 44, 0x2d6e28], [0, -200, 65, 55, 0x336b2e],
  [220, 20, 38, 30, 0x3a7832], [-220, -20, 42, 35, 0x2d6e28],
];
mtnPositions.forEach(([x, z, h, r, c]) => addMountain(x, z, h, r, c));

// ─── Track ────────────────────────────────────────────────────────────────────
const RAW_WAYPOINTS = [
  new THREE.Vector3(  0,  0,   5),  // Start/finish
  new THREE.Vector3( 30,  0,   0),  // Main straight
  new THREE.Vector3( 60,  0,  -5),
  new THREE.Vector3( 90,  0,  -5),  // End of straight
  new THREE.Vector3(110,  0, -20),  // Entry to hairpin 1
  new THREE.Vector3(115,  0, -45),  // Hairpin apex
  new THREE.Vector3(105,  0, -65),  // Hairpin exit
  new THREE.Vector3( 75,  0, -75),  // Sweeper entry
  new THREE.Vector3( 45,  0, -90),
  new THREE.Vector3( 10,  0,-105),  // Chicane left
  new THREE.Vector3(-15,  0,-115),  // Chicane right
  new THREE.Vector3(-35,  0,-125),
  new THREE.Vector3(-60,  0,-130),  // Back hairpin entry
  new THREE.Vector3(-90,  0,-125),  // Back hairpin apex
  new THREE.Vector3(-110, 0,-105),  // Back hairpin exit
  new THREE.Vector3(-115, 0, -75),  // Long sweeper
  new THREE.Vector3(-100, 0, -45),
  new THREE.Vector3( -75, 0, -20),
  new THREE.Vector3( -50, 0,  -8),  // Return straight
  new THREE.Vector3( -20, 0,   0),
];

const curve = new THREE.CatmullRomCurve3(RAW_WAYPOINTS, true);
const SEGMENTS = 400;
const pts = Array.from({ length: SEGMENTS }, (_, i) => curve.getPoint(i / SEGMENTS));

const TRACK_W = 7.0;   // half-width
const KERB_W  = 2.5;

// Build track ribbon from spline
function buildRibbon(points, hw, mat, closed) {
  const positions = [];
  const n = points.length;
  for (let i = 0; i < n; i++) {
    const curr = points[i];
    const next = points[(i + 1) % n];
    const dir  = new THREE.Vector3().subVectors(next, curr).normalize();
    const right = new THREE.Vector3(dir.z, 0, -dir.x);
    const l = curr.clone().addScaledVector(right, -hw);
    const r = curr.clone().addScaledVector(right,  hw);
    positions.push(l.x, l.y, l.z, r.x, r.y, r.z);
  }
  const geo  = new THREE.BufferGeometry();
  const verts = new Float32Array(positions);
  geo.setAttribute('position', new THREE.BufferAttribute(verts, 3));
  const indices = [];
  const count = n;
  for (let i = 0; i < count - 1; i++) {
    const a = i*2, b = i*2+1, c = (i+1)*2, d = (i+1)*2+1;
    indices.push(a,b,c, b,d,c);
  }
  if (closed) {
    const a = (count-1)*2, b = (count-1)*2+1;
    indices.push(a,b,0, b,1,0);
  }
  geo.setIndex(indices);
  const normals = new Float32Array(positions.length);
  for (let i = 1; i < positions.length; i += 3) normals[i] = 1;
  geo.setAttribute('normal', new THREE.BufferAttribute(normals, 3));
  const mesh = new THREE.Mesh(geo, mat);
  mesh.receiveShadow = true;
  return mesh;
}

// Road surface
const roadMat  = new THREE.MeshLambertMaterial({ color: 0x888888, side: THREE.DoubleSide });
const roadMesh = buildRibbon(pts, TRACK_W, roadMat, true);
roadMesh.position.y = 0.5;
scene.add(roadMesh);

// Kerb (left/right) - alternating F1-style red/yellow
function buildKerbs(points, innerHW, kerbHW, colA, colB, yOff) {
  const matA = new THREE.MeshLambertMaterial({ color: colA });
  const matB = new THREE.MeshLambertMaterial({ color: colB });
  const n = points.length;
  const STRIPE = 5;
  for (let side = -1; side <= 1; side += 2) {
    for (let i = 0; i < n; i++) {
      const stripe = Math.floor(i / STRIPE);
      const mat = (stripe % 2 === 0) ? matA : matB;
      const curr = points[i];
      const next = points[(i + 1) % n];
      const dir  = new THREE.Vector3().subVectors(next, curr).normalize();
      const right = new THREE.Vector3(dir.z, 0, -dir.x).multiplyScalar(side);

      const il = curr.clone().addScaledVector(right, innerHW);
      const ir = curr.clone().addScaledVector(right, innerHW + kerbHW);
      const jl = next.clone().addScaledVector(right, innerHW);
      const jr = next.clone().addScaledVector(right, innerHW + kerbHW);

      const geo = new THREE.BufferGeometry();
      const verts = new Float32Array([
        il.x, il.y + yOff, il.z,
        ir.x, ir.y + yOff, ir.z,
        jl.x, jl.y + yOff, jl.z,
        jr.x, jr.y + yOff, jr.z,
      ]);
      geo.setAttribute('position', new THREE.BufferAttribute(verts, 3));
      geo.setIndex([0,1,2, 1,3,2]);
      geo.computeVertexNormals();
      scene.add(new THREE.Mesh(geo, mat));
    }
  }
}



// F1-style red/yellow kerbs
buildKerbs(pts, TRACK_W, KERB_W, 0xdd0000, 0xf5c500, 0.52);
buildKerbs(pts, TRACK_W + KERB_W, 0.8, 0xf5c500, 0xdd0000, 0.50);

// ─── Trackside Fence ──────────────────────────────────────────────────────────
function buildFence(points, offsetHW) {
  const n = points.length;
  const STEP = 5;
  const postH   = 2.8;
  const railHts = [0.55, 1.2, 2.0, 2.6];
  const fPostMat = new THREE.MeshLambertMaterial({ color: 0x888888 });
  const fRailMat = new THREE.MeshLambertMaterial({ color: 0xbbbbbb });
  const postGeo  = new THREE.BoxGeometry(0.18, postH, 0.18);
  const railGeo  = new THREE.BoxGeometry(1, 0.07, 0.07);
  const dummy    = new THREE.Object3D();

  for (let side = -1; side <= 1; side += 2) {
    const sidePos = [];
    for (let i = 0; i < n; i += STEP) {
      const curr = points[i];
      const next = points[(i + 1) % n];
      const dir  = new THREE.Vector3().subVectors(next, curr).normalize();
      const right = new THREE.Vector3(dir.z, 0, -dir.x);
      sidePos.push(curr.clone().addScaledVector(right, side * offsetHW));
    }

    const cnt = sidePos.length;

    // Posts
    const postInst = new THREE.InstancedMesh(postGeo, fPostMat, cnt);
    postInst.castShadow = true;
    sidePos.forEach((p, i) => {
      dummy.position.set(p.x, postH / 2 + 0.5, p.z);
      dummy.rotation.set(0, 0, 0);
      dummy.scale.set(1, 1, 1);
      dummy.updateMatrix();
      postInst.setMatrixAt(i, dummy.matrix);
    });
    postInst.instanceMatrix.needsUpdate = true;
    scene.add(postInst);

    // Rails
    const railInst = new THREE.InstancedMesh(railGeo, fRailMat, cnt * railHts.length);
    let ri = 0;
    for (let i = 0; i < cnt; i++) {
      const p1  = sidePos[i];
      const p2  = sidePos[(i + 1) % cnt];
      const len = p1.distanceTo(p2);
      const ang = Math.atan2(-(p2.z - p1.z), p2.x - p1.x);
      const mx  = (p1.x + p2.x) / 2;
      const mz  = (p1.z + p2.z) / 2;
      for (const h of railHts) {
        dummy.position.set(mx, h + 0.5, mz);
        dummy.rotation.set(0, ang, 0);
        dummy.scale.set(len, 1, 1);
        dummy.updateMatrix();
        railInst.setMatrixAt(ri++, dummy.matrix);
      }
    }
    railInst.instanceMatrix.needsUpdate = true;
    scene.add(railInst);
  }
}

buildFence(pts, TRACK_W + KERB_W + 1.6);

// ─── F1 Start/Finish Gantry (spans across track) ─────────────────────────────
{
  const sfPos   = curve.getPoint(0);
  const sfTan   = curve.getTangent(0).normalize();
  // Perpendicular to track (road-width direction)
  const sfRight = new THREE.Vector3(sfTan.z, 0, -sfTan.x);

  const SPAN   = TRACK_W + KERB_W + 2.5;  // distance from center to each post
  const POST_H = 11;

  const archGroup  = new THREE.Group();
  const darkMat    = new THREE.MeshLambertMaterial({ color: 0x141414 });
  const greenMat   = new THREE.MeshLambertMaterial({ color: 0x006930 });
  const whiteMat   = new THREE.MeshLambertMaterial({ color: 0xffffff });
  const blackMat   = new THREE.MeshLambertMaterial({ color: 0x0a0a0a });
  const redLtMat   = new THREE.MeshPhongMaterial({ color: 0x550000, shininess: 80 });

  // Two tall posts outside the road on each side
  [-1, 1].forEach(side => {
    const post = new THREE.Mesh(new THREE.BoxGeometry(0.8, POST_H, 0.8), darkMat);
    post.position.set(
      sfPos.x + sfRight.x * side * SPAN,
      POST_H / 2,
      sfPos.z + sfRight.z * side * SPAN
    );
    archGroup.add(post);
  });

  // Overhead bar running across the track (along sfRight direction)
  const barLen   = SPAN * 2 + 2.0;
  const barAngle = Math.atan2(sfTan.z, -sfTan.x);  // rotate bar Z-axis → sfRight

  const mainBar = new THREE.Mesh(new THREE.BoxGeometry(0.6, 1.4, barLen), greenMat);
  mainBar.rotation.y = barAngle;
  mainBar.position.set(sfPos.x, POST_H, sfPos.z);
  archGroup.add(mainBar);

  // White sponsor stripe on the front face of the bar (facing approaching cars)
  const stripe = new THREE.Mesh(new THREE.BoxGeometry(0.62, 0.30, barLen - 0.4), whiteMat);
  stripe.rotation.y = barAngle;
  stripe.position.set(sfPos.x - sfTan.x * 0.31, POST_H + 0.18, sfPos.z - sfTan.z * 0.31);
  archGroup.add(stripe);

  // Black timing / start-light panel hanging in the center
  const panel = new THREE.Mesh(new THREE.BoxGeometry(0.32, 2.1, 5.0), blackMat);
  panel.rotation.y = barAngle;
  panel.position.set(sfPos.x - sfTan.x * 0.25, POST_H - 1.35, sfPos.z - sfTan.z * 0.25);
  archGroup.add(panel);

  // 5 red start lights along the panel
  for (let i = 0; i < 5; i++) {
    const offset = (i - 2) * 0.9;
    const lt = new THREE.Mesh(new THREE.SphereGeometry(0.19, 12, 8), redLtMat);
    lt.position.set(
      sfPos.x - sfTan.x * 0.42 + sfRight.x * offset,
      POST_H - 1.35,
      sfPos.z - sfTan.z * 0.42 + sfRight.z * offset
    );
    archGroup.add(lt);
  }

  scene.add(archGroup);
}

// ─── F1 Starting Grid markings ────────────────────────────────────────────────
{
  const gridMat = new THREE.MeshLambertMaterial({ color: 0xffffff, side: THREE.DoubleSide });

  // Double start/finish line across track width
  const sfPos = curve.getPoint(0);
  const sfTan = curve.getTangent(0);
  const lineRot = Math.atan2(sfTan.x, sfTan.z);
  [-0.35, 0.35].forEach(off => {
    const fl = new THREE.Mesh(new THREE.PlaneGeometry(TRACK_W * 2, 0.16), gridMat);
    fl.rotation.order = 'YXZ';
    fl.rotation.x = -Math.PI / 2;
    fl.rotation.y = lineRot;
    fl.position.set(sfPos.x + sfTan.x * off, 0.515, sfPos.z + sfTan.z * off);
    scene.add(fl);
  });

  // Grid position boxes — ⊓ shape (front line + two side lines, open at rear)
  const BOX_W = 2.8, BOX_L = 7.5, LT = 0.13;
  for (let g = 0; g < 10; g++) {
    const t    = 1.0 - (g + 1) * 0.009;
    const cpos = curve.getPoint(t);
    const ctan = curve.getTangent(t);
    const perpX = ctan.z, perpZ = -ctan.x;
    const side  = (g % 2 === 0) ? -1 : 1;

    const bg = new THREE.Group();
    bg.position.set(
      cpos.x + perpX * side * 3.5,
      0.516,
      cpos.z + perpZ * side * 3.5
    );
    bg.rotation.y = Math.atan2(ctan.x, ctan.z);

    // Front line (closed end, direction of travel)
    const fr = new THREE.Mesh(new THREE.PlaneGeometry(BOX_W, LT), gridMat);
    fr.rotation.x = -Math.PI / 2;
    fr.position.set(0, 0, BOX_L / 2);
    bg.add(fr);

    // Left side line
    const ls = new THREE.Mesh(new THREE.PlaneGeometry(LT, BOX_L), gridMat);
    ls.rotation.x = -Math.PI / 2;
    ls.position.set(-BOX_W / 2, 0, 0);
    bg.add(ls);

    // Right side line
    const rs = new THREE.Mesh(new THREE.PlaneGeometry(LT, BOX_L), gridMat);
    rs.rotation.x = -Math.PI / 2;
    rs.position.set(BOX_W / 2, 0, 0);
    bg.add(rs);

    scene.add(bg);
  }
}

// ─── Checkpoints (invisible, 3 evenly spaced after start) ─────────────────────
const CP_T = [0.28, 0.55, 0.78];
const checkpoints = CP_T.map(t => {

});

CP_T.forEach((t, i) => {

const CP_HIT_COLOR    = 0x00dd44;  // green  = passed

const CP_SPAN         = TRACK_W + KERB_W + 1.0;

}

// ─── Car State ────────────────────────────────────────────────────────────────
const START_POS     = new THREE.Vector3(0, 0, 3);
const START_HEADING = 0;

const car = {
  pos:     START_POS.clone(),
  heading: START_HEADING,
  speed:   0,
  vel:     new THREE.Vector3(),
};

const camPos  = new THREE.Vector3(0, 5, 12);
const camLook = new THREE.Vector3(0, 1, 0);

// ─── Race State ──────────────────────────────────────────────────────────────
let lapStart    = null;
let elapsed     = 0;
let bestLap     = null;
let cpHits      = 0;
let lastCpPos   = START_POS.clone();
let lastCpHead  = START_HEADING;
let finishArmed = false;
let gameActive  = false;

// ─── Input ───────────────────────────────────────────────────────────────────
const keys = {};
window.addEventListener('keydown', e => {
  if (!gameActive) return;
  keys[e.code] = true;
  if (e.code === 'KeyR' || e.code === 'Enter') { e.preventDefault(); resetToLastCP(); }
  if (e.code === 'KeyT' || e.code === 'Backspace') { e.preventDefault(); restartRace(); }
});
window.addEventListener('keyup', e => { keys[e.code] = false; });

// ─── Timer format ─────────────────────────────────────────────────────────────
function fmtTime(ms) {
  const m  = Math.floor(ms / 60000);
  const s  = Math.floor((ms % 60000) / 1000);
  const cs = Math.floor(ms % 1000);
  return `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}.${String(cs).padStart(3,'0')}`;
}

// ─── Reset helpers ───────────────────────────────────────────────────────────
function resetToLastCP() {
  car.pos.copy(lastCpPos);
  car.pos.y = 0.5;
  car.heading = lastCpHead;
  car.speed = 0;
}

function restartRace() {
  car.pos.copy(START_POS);
  car.heading = START_HEADING;
  car.speed = 0;
  lapStart   = null;
  elapsed    = 0;
  cpHits     = 0;
  finishArmed = false;
  lastCpPos.copy(START_POS);
  lastCpHead = START_HEADING;
  checkpoints.forEach(cp => cp.hit = false);
  cpGateMats.forEach(m => { m.color.setHex(CP_GATE_COLOR); m.emissive.setHex(CP_GATE_COLOR); });
  updateHUD(0, 0, null);
}

// ─── HUD update ──────────────────────────────────────────────────────────────
function updateHUD(speedKmh, elapsedMs, bestMs) {
  document.getElementById('speed-val').textContent   = Math.round(Math.abs(speedKmh));
  document.getElementById('current-val').textContent = fmtTime(elapsedMs);
  document.getElementById('cp-val').textContent      = `${cpHits} / 3`;
  if (bestMs !== null) {
    document.getElementById('record-val').textContent = fmtTime(bestMs);
    const diff = elapsedMs - bestMs;
    const diffEl = document.getElementById('diff-val');
    if (diff >= 0) {
      diffEl.textContent = '+' + fmtTime(diff);
      diffEl.style.color = '#ff6666';
    } else {
      diffEl.textContent = '-' + fmtTime(-diff);
      diffEl.style.color = '#66ff88';
    }
  } else {
    document.getElementById('record-val').textContent = '---';
    document.getElementById('diff-val').textContent   = '---';
    document.getElementById('diff-val').style.color   = '#fff';
  }
}

// ─── GO! flash ────────────────────────────────────────────────────────────────
function flashGo() {
  const el = document.getElementById('go-msg');
  el.style.display = 'block';
  setTimeout(() => { el.style.display = 'none'; }, 800);
}

// ─── Menu camera ─────────────────────────────────────────────────────────────
camera.position.set(-10, 10, 22);
camera.lookAt(20, 0, -40);

// ─── Game Loop ────────────────────────────────────────────────────────────────
let prevTime = performance.now();

function loop() {
  requestAnimationFrame(loop);

  const now = performance.now();
  const dt  = Math.min((now - prevTime) / 1000, 0.05);
  prevTime  = now;

  if (gameActive) {
    // ── Physics ────────────────────────────────────────────────────────────
    const up    = keys['ArrowUp']    || keys['KeyW'];
    const down  = keys['ArrowDown']  || keys['KeyS'];
    const left  = keys['ArrowLeft']  || keys['KeyA'];
    const right = keys['ArrowRight'] || keys['KeyD'];

    const throttle = up ? 1 : (down ? -0.6 : 0);
    if (throttle > 0) {
      car.speed += throttle * 160 * dt;
    } else if (throttle < 0) {
      if (car.speed > 0) {
        car.speed += throttle * 180 * dt;
      } else {
        car.speed += throttle * 35 * dt;
      }
    }

    car.speed *= Math.pow(0.974, dt * 60);
    car.speed = Math.max(-22, Math.min(83.3, car.speed));

    if (Math.abs(car.speed) > 0.5 && lapStart === null) {
      lapStart = now;
      flashGo();
    }

    const steerInput = left ? 1 : (right ? -1 : 0);
    const maxSteer   = 0.055 * (1.0 - Math.abs(car.speed) / 83.3);
    const steerAmt   = steerInput * Math.max(0.014, maxSteer);
    if (Math.abs(car.speed) > 0.3) {
      car.heading += steerAmt * Math.sign(car.speed);
    }

    car.pos.x += Math.sin(car.heading) * car.speed * dt;
    car.pos.z += Math.cos(car.heading) * car.speed * dt;
    car.pos.y  = 0.5;

    // ── Fence collision ────────────────────────────────────────────────────
    {
      const FENCE_R = TRACK_W + KERB_W + 0.5; // inner wall the car centre can't cross
      let minD2 = Infinity, nearX = 0, nearZ = 0;
      for (let i = 0; i < pts.length; i++) {
        const dx = car.pos.x - pts[i].x;
        const dz = car.pos.z - pts[i].z;
        const d2 = dx * dx + dz * dz;
        if (d2 < minD2) { minD2 = d2; nearX = pts[i].x; nearZ = pts[i].z; }
      }
      const dist = Math.sqrt(minD2);
      if (dist > FENCE_R) {
        const nx = (car.pos.x - nearX) / dist;
        const nz = (car.pos.z - nearZ) / dist;
        car.pos.x = nearX + nx * FENCE_R;
        car.pos.z = nearZ + nz * FENCE_R;
        car.speed *= 0.25;
      }
    }

    // ── Update 3D Car ──────────────────────────────────────────────────────
    carGroup.position.copy(car.pos);
    carGroup.rotation.y = car.heading;
    const wheelSpin = (car.speed / 0.40) * dt;
    wheels.forEach(w => { w.children[0].rotation.x += wheelSpin; });
    const steerVis = steerInput * 0.38;
    wheels[0].rotation.y = steerVis;
    wheels[1].rotation.y = steerVis;

    // ── Timer ──────────────────────────────────────────────────────────────
    if (lapStart !== null) {
      elapsed = now - lapStart;
    }

    // ── Checkpoints ────────────────────────────────────────────────────────
    checkpoints.forEach((cp, i) => {
      if (!cp.hit && car.pos.distanceTo(cp.pos) < cp.radius) {
        cp.hit = true;
        cpHits++;
        lastCpPos.copy(cp.pos);
        lastCpPos.y = 0;
        lastCpHead = cp.savedHeading;
        if (cpHits === 3) finishArmed = true;
        // Turn gate green
        cpGateMats[i].color.setHex(CP_HIT_COLOR);
        cpGateMats[i].emissive.setHex(CP_HIT_COLOR);
      }
    });

    // ── Finish line check ──────────────────────────────────────────────────
    if (finishArmed && car.pos.distanceTo(new THREE.Vector3(0,0,0)) < 8) {
      const lapTime = elapsed;
      if (bestLap === null || lapTime < bestLap) bestLap = lapTime;
      flashGo();
      lapStart = now;
      elapsed  = 0;
      cpHits   = 0;
      finishArmed = false;
      checkpoints.forEach(cp => cp.hit = false);
      cpGateMats.forEach(m => { m.color.setHex(CP_GATE_COLOR); m.emissive.setHex(CP_GATE_COLOR); });
      lastCpPos.copy(START_POS);
      lastCpHead = START_HEADING;
    }

    // ── Camera ────────────────────────────────────────────────────────────
    const camDist = 9 + Math.abs(car.speed) * 0.04;
    const camH    = 3.8;
    const targetPos = new THREE.Vector3(
      car.pos.x - Math.sin(car.heading) * camDist,
      car.pos.y + camH,
      car.pos.z - Math.cos(car.heading) * camDist
    );
    const targetLook = new THREE.Vector3(
      car.pos.x + Math.sin(car.heading) * 5,
      car.pos.y + 1.2,
      car.pos.z + Math.cos(car.heading) * 5
    );
    camPos.lerp(targetPos, 0.1);
    camLook.lerp(targetLook, 0.12);
    camera.position.copy(camPos);
    camera.lookAt(camLook);

    // ── HUD ───────────────────────────────────────────────────────────────
    const speedKmh = car.speed * 3.6;
    updateHUD(speedKmh, elapsed, bestLap);
  }

  renderer.render(scene, camera);
}

loop();

// ─── Play button ──────────────────────────────────────────────────────────────
document.getElementById('btn-play').addEventListener('click', () => {
  gameActive = true;
  document.getElementById('main-menu').style.display = 'none';
  document.getElementById('hud').style.display = 'flex';
  document.getElementById('instructions').style.display = 'block';
  camPos.copy(camera.position);
  camLook.set(20, 0, -40);
  flashGo();
});
